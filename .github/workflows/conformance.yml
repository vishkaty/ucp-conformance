name: conformance-selftest

# The "test suite for the test suite": on every push/PR, materialize the pinned
# upstream sources, bring up the official golden server, and run every self-validation
# gate (register quote-check, verdict gate, both version suites, the merchant reference
# gate, and mutation kill-rate). Red here means a change broke the suite's soundness.

on:
  push:
    branches: [main, "feat/**", "fix/**"]
    # public/** is included because the `coverage` gate cross-checks the published
    # coverage.json and the site's advertised check counts against reality.
    paths: ["conformance/**", "public/**", ".github/workflows/conformance.yml"]
  pull_request:
    paths: ["conformance/**", "public/**", ".github/workflows/conformance.yml"]
  workflow_dispatch: {}
  schedule:
    # Weekly heartbeat (Mon 06:17 UTC): sources are pinned, so this catches
    # environmental rot (runner images, toolchains, cache decay) — keeps the
    # "regularly tested and verified" promise even in quiet weeks.
    - cron: "17 6 * * 1"

jobs:
  selftest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false   # avoid the flaky cache-prune post-step (hangs then errors)

      - name: Set up Rust (for the ucp-schema oracle)
        uses: dtolnay/rust-toolchain@stable

      - name: Fetch pinned upstream sources
        run: bash conformance/ci/fetch_sources.sh

      - name: Cache the ucp-schema build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            conformance/.vendor/ucp-schema/target
          key: ucp-schema-${{ runner.os }}-${{ hashFiles('conformance/SOURCES.lock.json') }}

      - name: Build the ucp-schema oracle
        run: cargo build --release --manifest-path conformance/.vendor/ucp-schema/Cargo.toml

      - name: Bring up the golden server
        run: |
          bash conformance/ci/serve_golden.sh
        env:
          PORT: "8182"
          SIM_SECRET: selfcheck-secret
          DB_DIR: /tmp/ucp_test

      - name: Run the conformance self-test suite
        run: |
          python3 conformance/ci/run_suite.py \
            --server http://localhost:8182 \
            --require-server \
            --verbose
        # With the ucp-schema oracle built above, the schema / fixture / profile_schema
        # gates run for real here (no longer skipped).

      - name: Tear down the golden server
        if: always()
        run: bash conformance/ci/stop_golden.sh
        env:
          DB_DIR: /tmp/ucp_test

      - name: Verify the pip bundle is in sync with source
        run: |
          bash packaging/sync_bundle.sh
          git diff --exit-code packaging/spck_conformance/_bundle \
            || { echo "::error::packaging bundle is stale — run packaging/sync_bundle.sh and commit"; exit 1; }
