name: release

# Publish spck-conformance to PyPI when a version tag is pushed — via PyPI Trusted
# Publishing (OIDC), so NO API token is stored anywhere. Release flow:
#   1. bump the version in packaging/pyproject.toml, commit
#   2. git tag v<version>   (must match pyproject version — guarded below)
#   3. git push --tags  ->  this workflow builds + publishes.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Guard — git tag must match pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python3 -c "import tomllib;print(tomllib.load(open('packaging/pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG  pyproject=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match packaging/pyproject.toml version $PKG"; exit 1
          fi

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build --outdir dist packaging

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
