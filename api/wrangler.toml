name = "ucp-conformance-tool"
main = "worker.js"
compatibility_date = "2024-01-01"

[vars]
FROM_EMAIL = "UCP Conformance <otp@ucp-conformance.dev>"

# Secrets (set via `wrangler secret put`):
# RESEND_API_KEY

[[kv_namespaces]]
binding = "OTP_STORE"
id = ""  # Fill after `wrangler kv:namespace create OTP_STORE`

[[kv_namespaces]]
binding = "SESSIONS"
id = ""  # Fill after `wrangler kv:namespace create SESSIONS`

[[kv_namespaces]]
binding = "USERS"
id = ""  # Fill after `wrangler kv:namespace create USERS`

[[kv_namespaces]]
binding = "REPORTS"
id = ""  # Fill after `wrangler kv:namespace create REPORTS`
